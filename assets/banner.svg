<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
width="1200"
height="320"
viewBox="0 0 1200 320">

<style>

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

svg{
background:#0d1117;
font-family:'JetBrains Mono',monospace;
}

.window{
fill:#161b22;
stroke:#30363d;
stroke-width:2;
rx:18;
}

.title{
fill:#8b949e;
font-size:18px;
}

.big{
fill:#ffffff;
font-size:54px;
font-weight:700;
}

.normal{
fill:#58a6ff;
font-size:22px;
}

.green{
fill:#3fb950;
font-size:22px;
}

.gray{
fill:#c9d1d9;
font-size:20px;
}

.cursor{
fill:#58a6ff;
animation:blink 1s infinite;
}

.typing{
overflow:hidden;
white-space:nowrap;
animation:type 4s steps(40,end) forwards;
}

.typing2{
opacity:0;
animation:
show .1s 4s forwards,
type2 4s steps(40,end) 4s forwards;
}

.typing3{
opacity:0;
animation:
show .1s 8s forwards,
type3 4s steps(40,end) 8s forwards;
}

@keyframes blink{

0%{opacity:1;}

50%{opacity:0;}

100%{opacity:1;}

}

@keyframes show{

to{
opacity:1;
}

}

@keyframes type{

from{
clip-path:inset(0 100% 0 0);
}

to{
clip-path:inset(0 0 0 0);
}

}

@keyframes type2{

from{
clip-path:inset(0 100% 0 0);
}

to{
clip-path:inset(0 0 0 0);
}

}

@keyframes type3{

from{
clip-path:inset(0 100% 0 0);
}

to{
clip-path:inset(0 0 0 0);
}

}

</style>

<rect
x="20"
y="20"
width="1160"
height="280"
rx="18"
class="window"/>

<circle cx="55" cy="45" r="8" fill="#ff5f56"/>
<circle cx="80" cy="45" r="8" fill="#ffbd2e"/>
<circle cx="105" cy="45" r="8" fill="#27c93f"/>

<text
x="130"
y="50"
class="title">
arthrtx@github:~
</text>
<!-- Name -->

<text
x="70"
y="115"
class="big">
Arthur Sal
</text>

<!-- Subtitle -->

<text
x="70"
y="150"
class="normal">
Software Development Student
</text>

<!-- Divider -->

<line
x1="70"
y1="170"
x2="1130"
y2="170"
stroke="#30363d"
stroke-width="1"/>

<!-- Animated terminal -->

<text
x="70"
y="205"
class="green typing">
&gt; Building software...
</text>

<text
x="70"
y="235"
class="green typing2">
&gt; Learning every day...
</text>

<text
x="70"
y="265"
class="green typing3">
&gt; Ready for the next challenge.
</text>

<!-- Blinking cursor -->

<rect
class="cursor"
x="445"
y="249"
width="10"
height="22"/>

<!-- Tech Stack -->

<text
x="720"
y="120"
class="gray">
Python
</text>

<text
x="720"
y="150"
class="gray">
Java
</text>

<text
x="720"
y="180"
class="gray">
HTML
</text>

<text
x="720"
y="210"
class="gray">
CSS
</text>

<text
x="720"
y="240"
class="gray">
JavaScript
</text>

<text
x="720"
y="270"
class="gray">
SQL
</text>
<!-- Decorative ASCII -->

<text
x="980"
y="120"
font-size="64"
font-family="JetBrains Mono, monospace"
fill="#58a6ff"
font-weight="700">
&lt;/&gt;
</text>

<text
x="980"
y="165"
font-size="18"
font-family="JetBrains Mono, monospace"
fill="#8b949e">
Code.
</text>

<text
x="980"
y="190"
font-size="18"
font-family="JetBrains Mono, monospace"
fill="#8b949e">
Build.
</text>

<text
x="980"
y="215"
font-size="18"
font-family="JetBrains Mono, monospace"
fill="#8b949e">
Repeat.
</text>

<!-- Bottom line -->

<line
x1="70"
y1="285"
x2="1130"
y2="285"
stroke="#30363d"
stroke-width="1"/>

<!-- Footer -->

<text
x="70"
y="305"
font-size="14"
fill="#8b949e">
github.com/arthrtx
</text>

<text
x="1125"
y="305"
text-anchor="end"
font-size="14"
fill="#8b949e">
Arthur Sal © 2026
</text>

</svg>
